version: 2

models:
  - name: stg_orders
    description: "Cleaned orders table. One row per order."
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'processing', 'canceled',
                       'unavailable', 'invoiced', 'created', 'approved']

  - name: stg_customers
    description: "Cleaned customers table. One row per customer."
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "Cleaned order items. One row per item in an order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_payments
    description: "Cleaned payments. One row per payment transaction."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: stg_sellers
    description: "Cleaned sellers table. One row per seller."
    columns:
      - name: seller_id
        description: "Primary key"
        tests:
          - unique
          - not_null