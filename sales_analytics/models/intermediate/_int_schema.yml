version: 2

models:
  - name: int_order_payments
    description: "Aggregated payments per order."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: int_customer_orders
    description: "Aggregated order metrics per customer."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null